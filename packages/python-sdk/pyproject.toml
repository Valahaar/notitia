[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "notitia"
version = "1.1.0"
description = "Python SDK for Notitia, a distributed HTTP scheduling microservice"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [
    { name = "Niccolò Campolungo", email = "niccolo.campolungo@gmail.com" },
]

keywords = []
classifiers = []

dependencies = [
    "httpx",
]

[project.optional-dependencies]
fastapi = ["fastapi"]
beanie = ["beanie"]
pendulum = ["pendulum"]
all = ["notitia[fastapi,beanie,pendulum]"]

[tool.uv]
dev-dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["src/notitia"]
